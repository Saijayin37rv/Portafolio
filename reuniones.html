<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reuniones - Evidencias</title>
  <style>
    body {
      background: #181818;
      color: #f5f5f5;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #232323;
      border-radius: 14px;
      box-shadow: 0 4px 24px #0003;
      padding: 28px 22px;
      position: relative;
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 8px 0;
      color: #f87171;
      text-align: center;
      letter-spacing: .3px;
      text-shadow: 0 2px 12px #b91c1c55;
    }
    p {
      margin: 0;
      color: #d6d6d6;
      line-height: 1.5;
    }
    .back {
      display: inline-block;
      margin-top: 14px;
      color: #f87171;
      text-decoration: none;
      font-weight: 600;
    }
    .section-title {
      margin-top: 22px;
      color: #ef4444;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .evidencias {
      display: flex;
      flex-wrap: wrap;
      flex-direction: row;
      gap: 16px;
      margin-top: 14px;
      justify-content: center;
      align-items: flex-start;
    }
    figure { margin: 0; width: min(280px, 100%); }
    img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(185,28,28,0.18);
      border: 2px solid #b91c1c55;
      display: block;
      background: #232326;
    }

    .evidencias.one figure { width: min(520px, 100%); }
    .evidencias.one img { max-width: 520px; }
    .evidencias.three figure { width: min(360px, 100%); }
    .evidencias.three img { max-width: 360px; }
    figcaption {
      display: none;
    }
    @media (max-width: 600px) {
      .container { padding: 18px 14px; margin: 18px 10px; }
      h1 { font-size: 1.6rem; }
      figure { width: 100%; }
      img { border-radius: 10px; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reuniones (Sala de Juntas Personalizada)</h1>
    <p>
      Pagina interna para administrar el apartado de la sala de juntas de forma personalizada,
      permitiendo que colaboradores de Tactical registren y consulten la informacion de la agenda de manera clara.
    </p>
    <a class="back" href="./index.html">Volver a Proyectos</a>

    <div class="section-title">Evidencias (orden)</div>
    <div class="evidencias one">
      <figure>
        <img src="./evidencias ts/reuniones/sala_web.png" alt="Sala web">
      </figure>
    </div>
  </div>
</body>
</html>
